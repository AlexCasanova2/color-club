name: EAS Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        default: ios
        type: choice
        options:
          - ios
          - android
          - all
      profile:
        description: EAS build profile
        required: true
        default: production
        type: choice
        options:
          - production
          - preview
      wait:
        description: Wait for build to finish
        required: true
        default: false
        type: boolean
      submit_to_testflight:
        description: Submit iOS production build to TestFlight
        required: true
        default: true
        type: boolean

jobs:
  build:
    name: Build ${{ inputs.platform }} (${{ inputs.profile }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Typecheck
        run: npm run typecheck

      - name: Start EAS build
        run: |
          BUILD_ARGS=(--platform "${{ inputs.platform }}" --profile "${{ inputs.profile }}" --non-interactive)

          if [ "${{ inputs.wait }}" != "true" ]; then
            BUILD_ARGS+=(--no-wait)
          fi

          if [ "${{ inputs.submit_to_testflight }}" = "true" ] && [ "${{ inputs.platform }}" = "ios" ] && [ "${{ inputs.profile }}" = "production" ]; then
            BUILD_ARGS+=(--auto-submit-with-profile production)
          fi

          eas build "${BUILD_ARGS[@]}"
